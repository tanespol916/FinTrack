# Nixpacks configuration for FinTrack monorepo
[phases.setup]
nixPkgs = ["nodejs_20", "postgresql", "python311"]

[phases.build]
cmds = [
  "cd backend && npm ci",
  "cd backend && npx prisma generate",
  "cd backend && npm run build",
  "cd frontend && npm ci",
  "cd frontend && npm run build"
]

[start]
cmd = "cd backend && npm start"

[variables]
NODE_ENV = "production"
